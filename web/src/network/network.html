<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>УМ1 Сеть</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link rel="stylesheet" href="../common.css" />
  </head>
  <body>
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="container">
        <div id="notif" class="notification" style="display: none"></div>

        <div class="card">
          <h3>LAN</h3>
          <table class="settings-table">
            <tr>
              <td>DHCP:</td>
              <td><input type="checkbox" id="lan_dhcp" /></td>
            </tr>
            <tr>
              <td>Static IP:</td>
              <td>
                <input type="text" id="lan_static_ip" value="192.168.0.100" />
              </td>
            </tr>
            <tr>
              <td>Subnet:</td>
              <td>
                <input type="text" id="lan_subnet" value="255.255.255.0" />
              </td>
            </tr>
            <tr>
              <td>Gateway:</td>
              <td>
                <input type="text" id="lan_gateway" value="192.168.0.1" />
              </td>
            </tr>
          </table>
        </div>

        <div class="card">
          <h3>Wi‑Fi</h3>
          <table class="settings-table">
            <tr>
              <td>Включено:</td>
              <td><input type="checkbox" id="wifi_enabled" /></td>
            </tr>
            <tr>
              <td>SSID:</td>
              <td><input type="text" id="wifi_ssid" value="MyNetwork" /></td>
            </tr>
            <tr>
              <td>Password:</td>
              <td>
                <input type="password" id="wifi_password" value="MyPassword" />
              </td>
            </tr>
            <tr>
              <td>Режим:</td>
              <td>
                <select id="wifi_mode">
                  <option value="ap">AP</option>
                  <option value="sta">STA</option>
                </select>
              </td>
            </tr>
            <tr>
              <td>Auth Mode:</td>
              <td>
                <select id="wifi_authmode">
                  <option value="open">Open</option>
                  <option value="wpa2">WPA2-PSK</option>
                  <option value="wpa3">WPA3-SAE</option>
                  <option value="wpa_wpa2">WPA/WPA2 Mixed</option>
                </select>
              </td>
            </tr>
          </table>
        </div>

        <button class="primary" onclick="collectSettings()">
          Сохранить настройки
        </button>
        <pre id="json_output"></pre>
      </div>
    </div>

    <script src="../app.js"></script>
    <script src="network.js"></script>
    <script>
      loadConfigFromServer();
    </script>
  </body>
</html>
