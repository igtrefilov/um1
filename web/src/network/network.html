<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Сеть — УМ1</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>УМ1</h1>
    <nav>
      <a href="/index.html">Главная</a>
      <a href="/settings/settings.html">Настройки</a>
      <a href="/network/network.html" class="active">Сеть</a>
      <a href="/update/update.html">Обновление</a>
      <a href="/about/about.html">О системе</a>
      <a href="#" id="logout_btn">Выход</a>
    </nav>
  </header>
  <div class="container">
    <div id="notif" class="notification"></div>
    <div class="card">
      <h3>LAN</h3>
      <table class="settings-table">
        <tr><td>DHCP:</td><td><input type="checkbox" id="lan_dhcp" /></td></tr>
        <tr><td>Static IP:</td><td><input type="text" id="lan_static_ip" /></td></tr>
        <tr><td>Subnet:</td><td><input type="text" id="lan_subnet" /></td></tr>
        <tr><td>Gateway:</td><td><input type="text" id="lan_gateway" /></td></tr>
      </table>
    </div>
    <div class="card">
      <h3>Wi‑Fi</h3>
      <table class="settings-table">
        <tr><td>Включено:</td><td><input type="checkbox" id="wifi_enabled" /></td></tr>
        <tr><td>SSID:</td><td><input type="text" id="wifi_ssid" /></td></tr>
        <tr><td>Password:</td><td><input type="password" id="wifi_password" /></td></tr>
        <tr><td>Режим:</td><td><select id="wifi_mode"><option value="ap">AP</option><option value="sta">STA</option></select></td></tr>
        <tr><td>Auth Mode:</td><td><select id="wifi_authmode"><option value="open">Open</option><option value="wpa2">WPA2-PSK</option><option value="wpa3">WPA3-SAE</option><option value="wpa_wpa2">WPA/WPA2 Mixed</option></select></td></tr>
      </table>
    </div>
    <button onclick="collectSettings()">Сохранить настройки</button>
    <pre id="json_output"></pre>
  </div>
  <script src="/app.js"></script>
  <script src="/network/network.js"></script>
  <script>loadConfigFromServer();</script>
</body>
</html>
