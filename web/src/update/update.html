<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Обновление — УМ1</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>УМ1</h1>
    <nav>
      <a href="/gateway/gateway.html">Шлюз и мониторинг</a>
      <a href="/settings/settings.html">Настройки</a>
      <a href="/update/update.html" class="active">Обновление</a>
      <a href="/diagnostics/diagnostics.html">Диагностика</a>
      <a href="/about/about.html">О системе</a>
      <a href="#" id="logout_btn">Выход</a>
    </nav>
  </header>
  <div class="container">
    <div class="card">
      <h2>📦 Обновление устройства</h2>
      <div class="section">
        <label>Выберите папку <code>update</code> (с firmware.bin и src/):</label><br />
        <input type="file" id="updateFolder" webkitdirectory directory multiple />
      </div>
      <div class="section">
        <button onclick="uploadAll()">Обновить всё</button>
      </div>
      <div class="section" id="webSection">
        <h3 style="display:none">Web UI</h3>
        <progress id="webProgress" value="0" max="100" style="display:none"></progress>
        <p id="webStatus"></p>
      </div>
      <div class="section" id="fwSection">
        <h3 style="display:none">Firmware</h3>
        <progress id="otaProgress" value="0" max="100" style="display:none"></progress>
        <p id="otaStatus"></p>
      </div>
    </div>
    <div id="log" class="stream-output"></div>
  </div>
  <div id="reboot_overlay" class="overlay">
    <div class="overlay-card">
      <h3>Перезагрузка устройства…</h3>
      <progress id="rb_progress" max="100" value="0"></progress>
      <div id="rb_status" style="margin-top:8px">Ожидаем повторного подключения…</div>
    </div>
  </div>
  <script src="/app.js"></script>
  <script src="/update/update.js"></script>
</body>
</html>
