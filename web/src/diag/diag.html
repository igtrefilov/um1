<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Диагностика — УМ1</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>УМ1</h1>
    <nav>
      <a href="/gateway/gateway.html">Шлюз и мониторинг</a>
      <a href="/settings/settings.html">Настройки</a>
      <a href="/update/update.html">Обновление</a>
      <a href="/diag/diag.html" class="active">Диагностика</a>
      <a href="/about/about.html">О системе</a>
      <a href="#" id="logout_btn">Выход</a>
    </nav>
  </header>
  <div class="container">
    <div id="notif" class="notification"></div>
    <div class="card">
      <div class="cmd-row">
        <input id="message" type="text" placeholder="Введите команду" />
        <button onclick="sendMessage()">Отправить</button>
      </div>
      <div class="btn-row" style="margin-top:16px;">
        <button onclick="sendReboot()">Перезагрузить МК</button>
        <div class="spacer"></div>
        <button onclick="startStream()">Начать стрим</button>
        <button onclick="stopStream()">Остановить стрим</button>
      </div>
      <div class="check-row" style="margin-top:16px;">
        <label><input type="checkbox" id="uart1" /> uart1</label>
        <label><input type="checkbox" id="uart2" /> uart2</label>
      </div>
      <div id="server_status" class="server-status" style="display:none;">
        TCP <span id="tcp_status" class="status-dot"></span>
        UDP <span id="udp_status" class="status-dot"></span>
      </div>
    </div>
    <div id="log" class="stream-output"></div>
  </div>
  <div id="reboot_overlay" class="overlay">
    <div class="overlay-card">
      <h3>Перезагрузка устройства…</h3>
      <progress id="rb_progress" max="100" value="0"></progress>
      <div id="rb_status" style="margin-top:8px">Ожидаем повторного подключения…</div>
    </div>
  </div>
  <script src="/app.js"></script>
  <script src="/diag/diag.js"></script>
</body>
</html>
