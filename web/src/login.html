<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Вход — УМ1</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="fullscreen-center">
  <div class="card" style="width:320px;">
    <h2>Вход</h2>
    <div id="notif" class="notification"></div>
    <div class="fld">
      <label>Логин</label>
      <input id="login_user" type="text" autocomplete="username" />
    </div>
    <div class="fld">
      <label>Пароль</label>
      <input id="login_pass" type="password" autocomplete="current-password" />
    </div>
    <button id="login_btn">Войти</button>
  </div>
  <script src="/app.js"></script>
  <script src="/login.js"></script>
</body>
</html>
