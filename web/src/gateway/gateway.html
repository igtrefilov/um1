<!doctype html>

<script>
(function(){
  try{
    var t = localStorage.getItem('um1_theme');
    if(!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches){ t='light'; }
    if(!t) t='dark';
    document.documentElement.classList.add(t === 'light' ? 'theme-light' : 'theme-dark');
  }catch(e){}
})();
</script>
<link rel="stylesheet" href="/style.css" />

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Шлюз и мониторинг — УМ1</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>УМ1</h1>
    <nav>
      <a href="/gateway/gateway.html" class="active">Шлюз и мониторинг</a>
      <a href="/settings/settings.html">Настройки</a>
      <a href="/update/update.html">Обновление</a>
      <a href="/diag/diag.html">Диагностика</a>
      <a href="/about/about.html">О системе</a>
      <a href="#" id="logout_btn">Выход</a>
    </nav>
  </header>
  <div class="container">
    <div id="notif" class="notification"></div>
    <div class="card">
      <table class="settings-table">
        <tr>
          <th>Интерфейс полевой шины</th>
          <th colspan="2">Интерфейс шлюзования</th>
          <th colspan="2">Интерфейс мониторинга</th>
        </tr>
        <tr>
          <td>UART1</td>
          <td>
            <select id="gw_uart1_intf">
              <option value="uart2">UART2</option>
              <option value="lan">LAN</option>
              <option value="ap">AP</option>
              <option value="sta">STA</option>
            </select>
          </td>
          <td>
            <select id="gw_uart1_profile" disabled>

              <option value="ip1">IP_1</option>
              <option value="ip2">IP_2</option>
              <option value="mqtt1">MQTT_1</option>
              <option value="mqtt2">MQTT_2</option>
            </select>
          </td>
          <td>
            <select id="mon_uart1_intf">
              <option value="uart2">UART2</option>
              <option value="lan">LAN</option>
              <option value="ap">AP</option>
              <option value="sta">STA</option>
            </select>
          </td>
          <td>

            <select id="mon_uart1_profile" disabled>
              <option value="ip1">IP_1</option>
              <option value="ip2">IP_2</option>
              <option value="mqtt1">MQTT_1</option>
              <option value="mqtt2">MQTT_2</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>UART2</td>
          <td>
            <select id="gw_uart2_intf">
              <option value="uart1">UART1</option>
              <option value="lan">LAN</option>
              <option value="ap">AP</option>
              <option value="sta">STA</option>
            </select>
          </td>
          <td>
            <select id="gw_uart2_profile" disabled>
              <option value="ip1">IP_1</option>
              <option value="ip2">IP_2</option>
              <option value="mqtt1">MQTT_1</option>
              <option value="mqtt2">MQTT_2</option>
            </select>
          </td>
          <td>
            <select id="mon_uart2_intf">
              <option value="uart1">UART1</option>
              <option value="lan">LAN</option>
              <option value="ap">AP</option>
              <option value="sta">STA</option>
            </select>
          </td>
          <td>
            <select id="mon_uart2_profile" disabled>
              <option value="ip1">IP_1</option>
              <option value="ip2">IP_2</option>
              <option value="mqtt1">MQTT_1</option>
              <option value="mqtt2">MQTT_2</option>
            </select>
          </td>
        </tr>
      </table>
      <pre id="route_info" class="infographic" aria-label="Инфографика маршрутизации" tabindex="0"></pre>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <button id="save_routes_btn">Сохранить</button>
      <div class="spacer"></div>
      <button onclick="sendReboot()">Перезагрузить МК</button>
    </div>
  </div>
  <div id="reboot_overlay" class="overlay">
    <div class="overlay-card">
      <h3>Перезагрузка устройства…</h3>
      <progress id="rb_progress" max="100" value="0"></progress>
      <div id="rb_status" style="margin-top:8px">Ожидаем повторного подключения…</div>
    </div>
  </div>
  <script src="/app.js"></script>
  <script src="/gateway/gateway.js"></script>
</body>
</html>
