<!DOCTYPE html>
<html>
	<head>
	  <meta charset="UTF-8">
	  <title>УМ1 настройки</title>
	  <link rel="icon" type="image/png" href="../favicon.png">  
	  <link rel="stylesheet" href="../common.css">
	  <link rel="stylesheet" href="settings.css">
	</head>
	<body>
		<div class="sidebar" id="sidebar"></div>
		<div class="content"><div class="container">
			<div id="notif" class="notification" style="display:none;"></div>

			<h3>UART 1</h3>
			<table class="settings-table">
			  <tr><td>Baudrate:</td><td><input type="number" id="uart1_baudrate"></td></tr>
			  <tr><td>Parity:</td>
				  <td><select id="uart1_parity">
					  <option value="none">None</option>
					  <option value="even">Even</option>
					  <option value="odd">Odd</option>
				  </select></td></tr>
			  <tr><td>Stop Bits:</td>
				  <td><select id="uart1_stop_bits">
					  <option value="1">1</option>
					  <option value="2">2</option>
				  </select></td></tr>
			</table>

			<h3>UART 2</h3>
			<table class="settings-table">
			  <tr><td>Baudrate:</td><td><input type="number" id="uart2_baudrate"></td></tr>
			  <tr><td>Parity:</td>
				  <td><select id="uart2_parity">...
				  	  <option value="none">None</option>
					  <option value="even">Even</option>
					  <option value="odd">Odd</option>
				  </select></td></tr>
			  <tr><td>Stop Bits:</td>
				  <td><select id="uart2_stop_bits">
				  	<option value="1">1</option>
					<option value="2">2</option>
				  </select></td></tr>
			</table>
			
			<h3>MQTT</h3>
			<table class="settings-table">
			  <tr><td>Enabled:</td><td><input type="checkbox" id="mqtt_enabled"></td></tr>
			  <tr><td>Broker URL:</td><td><input type="text" id="mqtt_broker"></td></tr>
			  <tr><td>Username:</td><td><input type="text" id="mqtt_username"></td></tr>
			  <tr><td>Password:</td><td><input type="password" id="mqtt_password"></td></tr>
			</table>
			
			<h3>TCP/UDP</h3>
			<table class="settings-table">
			  <tr><td>TCP Enabled:</td><td><input type="checkbox" id="tcp_enabled"></td></tr>
			  <tr><td>Server:</td><td><input type="text" id="tcp_server" placeholder="tcp server ip"></td></tr>
			  <tr><td>Port:</td><td><input type="number" id="tcp_port" placeholder="1234"></td></tr>

			  <tr><td>UDP Enabled:</td><td><input type="checkbox" id="udp_enabled"></td></tr>
			  <tr><td>Server:</td><td><input type="text" id="udp_server" placeholder="udp server ip"></td></tr>
			  <tr><td>Port:</td><td><input type="number" id="udp_port" placeholder="1234"></td></tr>
			</table>
			
			<h3>SNTP</h3>
			<table class="settings-table">
			  <tr>
				<td>Enabled:</td>
				<td><input type="checkbox" id="sntp_enabled" onchange="toggleSntpFields()"></td>
			  </tr>
			  <tr>
				<td>Server IP:</td>
				<td><input type="text" id="sntp_server_ip"></td>
			  </tr>
			  <tr>
				<td>Sync Interval (sec):</td>
				<td><input type="number" id="sntp_interval"></td>
			  </tr>
			</table>
			
			<br>
			<button onclick="collectSettings()">Сохранить настройки</button>
			<pre id="json_output"></pre>
		<script src="/app.js"></script>

			
		</div>
		</div>
		<script src="settings.js"></script>
		<script src="/app.js"></script>
<script>loadConfigFromServer();</script>
	</body>
</html>
