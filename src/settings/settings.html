<!DOCTYPE html>
<html>
	<head>
	  <meta charset="UTF-8">
	  <title>УМ1 настройки</title>
	  <link rel="icon" type="image/png" href="../favicon.png">  
	  <link rel="stylesheet" href="../common.css">
	  <link rel="stylesheet" href="settings.css">
	</head>
	<body>
		<div class="sidebar" id="sidebar"></div>
		<div class="content">
			<div id="notif" class="notification" style="display:none;"></div>

			<h3>UART</h3>
			<table class="settings-table">
			  <tr>
				<td>Baudrate:</td>
				<td><input type="number" id="uart_baudrate" value="115200"></td>
			  </tr>
			  <tr>
				<td>Parity:</td>
				<td>
				  <select id="uart_parity">
					<option value="none">None</option>
					<option value="even">Even</option>
					<option value="odd">Odd</option>
				  </select>
				</td>
			  </tr>
			  <tr>
				<td>Stop Bits:</td>
				<td>
				  <select id="uart_stop_bits">
					<option value="1">1</option>
					<option value="2">2</option>
				  </select>
				</td>
			  </tr>
			</table>

			<br>
			<button onclick="collectSettings()">Сохранить настройки</button>
			<pre id="json_output"></pre>
			
		</div>
		<script src="settings.js"></script>
		<script>loadSidebar();</script>
		<script>loadConfigFromServer();</script>
	</body>
</html>
