<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>УМ1 Обновление</title>
  <link rel="icon" type="image/png" href="../favicon.png">  
  <link rel="stylesheet" href="../um1_main.css">
  <style>
    .section {
      margin-bottom: 30px;
    }

    progress {
      width: 100%;
      height: 20px;
    }

    #otaStatus, #webStatus {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="content">

    <h2>📦 Обновление устройства</h2>

    <div class="section">
      <label>Выберите папку <code>update</code> (с firmware.bin и src/):</label><br>
      <input type="file" id="updateFolder" webkitdirectory directory multiple><br><br>
      <button onclick="uploadAll()">Обновить всё</button>
    </div>

    <div class="section">
      <h3>Прошивка</h3>
      <progress id="otaProgress" value="0" max="100" style="display:none;"></progress>
      <p id="otaStatus"></p>
    </div>

    <div class="section">
      <h3>Web UI (src)</h3>
      <progress id="webProgress" value="0" max="100" style="display:none;"></progress>
      <p id="webStatus"></p>
    </div>
  </div>
  <div id="log" class="content" ></div>

  <script src="update.js"></script>
  <script>loadSidebar();</script>
</body>
</html>
